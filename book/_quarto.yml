project:
  type: book
  # Render straight into the Astro site, so the book is served at /book/.
  # The sources here stay outside public/ and are never published raw.
  output-dir: ../public/book

book:
  title: "Time Series Analysis in Financial Econometrics"
  subtitle: "A Hands-On Guide with R and Python, following Tsay"
  author: "Mehman Ismayilli"
  date: today
  search: true
  page-footer: "Time Series Analysis in Financial Econometrics"
  chapters:
    - index.qmd
    - chapters/01-returns.qmd
    - chapters/02-distribution.qmd
    - chapters/03-linear-ts.qmd
    - chapters/04-ma.qmd
    - chapters/05-arma.qmd
    - chapters/07-unit-root.qmd
    - chapters/08-arima.qmd
    - chapters/09-arch.qmd
    - chapters/10-garch.qmd
    - chapters/11-garch-est.qmd
    - chapters/15-extreme-values.qmd
    - chapters/14-options.qmd
    - chapters/13-continuous-time.qmd
    - chapters/12-nonlinear.qmd

bibliography: references.bib

# Code is shown for reference in R/Python tabs (not executed on render); results
# are reported in the text and figures are pre-rendered images. The book therefore
# builds as a plain document — no R or Python session is needed to render it.
format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: true
    toc-depth: 3
    number-sections: true
    code-copy: true
    code-overflow: wrap
    fontsize: 1.02rem
    linestretch: 1.7
  pdf:
    documentclass: scrbook
    number-sections: true
    keep-tex: false

name: Sync M&A Watch data

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  # Manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

# Avoid overlapping runs racing to push the same file.
concurrency:
  group: sync-ma-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run M&A Watch data sync
        run: node scripts/sync-ma-cases.mjs

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ma-watch-data.json
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit."
          else
            git commit -m "chore: sync M&A Watch data $(date -u +'%Y-%m-%d')"
            git push
          fi
